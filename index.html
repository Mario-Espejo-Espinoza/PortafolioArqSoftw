<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portafolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;

    /* FONDO */
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("https://images.unsplash.com/photo-1518770660439-4636190af475");
    background-size: cover;
    background-position: center;
}

/* TITULO ARRIBA */
.titulo {
    text-align: center;
    margin-top: 40px;
    color: #38bdf8;
    font-size: 40px;
}

/* CONTENEDOR CENTRADO */
.container {
    width: 300px;
    margin: 60px auto;
    text-align: center;
    background: rgba(15, 23, 42, 0.85);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
}

/* FOTO */
.foto {
    width: 120px;
    border-radius: 50%;
    margin: 15px;
    border: 3px solid #38bdf8;
}

/* INPUTS */
input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 90%;
    border-radius: 5px;
    border: none;
}

/* BOTON */
button {
    padding: 10px 20px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>

<script>
function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "admin" && pass === "1234"){
        localStorage.setItem("rol", "admin");
        alert("Modo Administrador");
    } else {
        localStorage.setItem("rol", "visitante");
        alert("Modo Visitante");
    }

    window.location.href = "index.html";
}
</script>

</head>
<body>

<!-- LOGO UPLA -->
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Logo_UPLA.png"
style="position:absolute; top:20px; right:20px; width:100px;">

<!-- TITULO ARRIBA -->
<h1 class="titulo">PORTAFOLIO<br>MARIO ESPEJO ESPINOZA</h1>

<!-- CAJA LOGIN -->
<div class="container">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="foto">

<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

</div>

</body>
</html>
