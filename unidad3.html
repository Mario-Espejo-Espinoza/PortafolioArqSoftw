<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Unidad 3</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

h1 {
    text-align: center;
    color: #22c55e;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.card:hover {
    background: #334155;
}

.nav {
    text-align: center;
    margin: 20px;
}
</style>

<script>
function guardarArchivo(input, semana) {
    let archivo = input.files[0];

    if (archivo) {
        let lector = new FileReader();

        lector.onload = function(e) {
            localStorage.setItem("archivo"+semana, e.target.result);
            localStorage.setItem("nombre"+semana, archivo.name);
            mostrarArchivo(semana);
        };

        lector.readAsDataURL(archivo);
    }
}

function mostrarArchivo(semana){
    let data = localStorage.getItem("archivo"+semana);
    let nombre = localStorage.getItem("nombre"+semana);

    if(data){
        document.getElementById("file"+semana).innerHTML =
            `<p>${nombre}</p><iframe src="${data}" width="100%" height="150px"></iframe>`;
    }
}

window.onload = function(){
    let rol = localStorage.getItem("rol");

    for(let i=5; i<=8; i++){
        mostrarArchivo(i);
    }

    if(rol === "visitante"){
        let inputs = document.querySelectorAll("input[type='file']");
        inputs.forEach(input => input.style.display = "none");
    }
}
</script>

</head>
<body>

<h1>Unidad III</h1>

<div class="grid">

<div class="card">
<h3>Semana 9</h3>
<input type="file" onchange="guardarArchivo(this,5)">
<div id="file5"></div>
</div>

<div class="card">
<h3>Semana 10</h3>
<input type="file" onchange="guardarArchivo(this,6)">
<div id="file6"></div>
</div>

<div class="card">
<h3>Semana 11</h3>
<input type="file" onchange="guardarArchivo(this,7)">
<div id="file7"></div>
</div>

<div class="card">
<h3>Semana 12</h3>
<input type="file" onchange="guardarArchivo(this,8)">
<div id="file8"></div>
</div>

</div>

<div class="nav">
<a href="intro.html">⬅ Volver</a>
</div>

</body>
</html>
