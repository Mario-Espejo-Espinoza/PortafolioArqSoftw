<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introducción</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111827;
    color:white;
}

.container{
    width:90%;
    margin:auto;
    padding:40px;
}

h1{
    text-align:center;
    color:#60a5fa;
    font-size:50px;
}

.unidades{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
    margin-top:50px;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

.card h2{
    color:#60a5fa;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:#2563eb;
    color:white;
    padding:12px 25px;
    border-radius:10px;
    text-decoration:none;
}

.btn:hover{
    background:#1d4ed8;
}

</style>

</head>
<body>

<div class="container">

    <h1>UNIDADES DEL CURSO</h1>
    <a href="index.html" class="btn">← Volver al Inicio</a>

    <div class="unidades">

        <div class="card">
            <h2>Unidad I</h2>

            <a href="unidad1.html" class="btn">
                Ingresar
            </a>
        </div>

        <div class="card">
            <h2>Unidad II</h2>

            <a href="unidad2.html" class="btn">
                Ingresar
            </a>
        </div>

        <div class="card">
            <h2>Unidad III</h2>

            <a href="unidad3.html" class="btn">
                Ingresar
            </a>
        </div>

        <div class="card">
            <h2>Unidad IV</h2>

            <a href="unidad4.html" class="btn">
                Ingresar
            </a>
        </div>

    </div>

</div>

</body>
</html>
